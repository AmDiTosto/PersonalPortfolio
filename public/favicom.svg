<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- background -->
  <rect width="16" height="16" fill="#008080"/>

  <!-- tiny retro window -->
  <rect x="1" y="1" width="14" height="14" fill="#c0c0c0"/>
  <rect x="1" y="1" width="14" height="1" fill="#ffffff"/>
  <rect x="1" y="1" width="1" height="14" fill="#ffffff"/>
  <rect x="14" y="1" width="1" height="14" fill="#404040"/>
  <rect x="1" y="14" width="14" height="1" fill="#404040"/>

  <!-- title bar -->
  <rect x="2" y="2" width="12" height="2" fill="#000080"/>

  <!-- AD pixel letters -->
  <!-- A -->
  <rect x="3" y="7" width="1" height="5" fill="#000000"/>
  <rect x="5" y="7" width="1" height="5" fill="#000000"/>
  <rect x="4" y="6" width="1" height="1" fill="#000000"/>
  <rect x="3" y="9" width="3" height="1" fill="#000000"/>

  <!-- D -->
  <rect x="8" y="6" width="1" height="6" fill="#000000"/>
  <rect x="9" y="6" width="2" height="1" fill="#000000"/>
  <rect x="9" y="11" width="2" height="1" fill="#000000"/>
  <rect x="11" y="7" width="1" height="4" fill="#000000"/>

  <!-- subtle highlight pixels -->
  <rect x="3" y="7" width="1" height="1" fill="#ffffff"/>
  <rect x="8" y="6" width="1" height="1" fill="#ffffff"/>
</svg>